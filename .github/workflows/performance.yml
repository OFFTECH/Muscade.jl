name: Performance Regression Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  JULIA_NUM_THREADS: 2

jobs:
  performance:
    name: Performance Tests (Julia ${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.12'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for comparison

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v4
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-perf-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-perf-
            ${{ runner.os }}-

      - name: Install dependencies
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Download baseline from main branch
        run: |
          git fetch origin main
          git show origin/main:benchmark/baseline.txt > benchmark/baseline_main.txt || echo "No baseline on main"

      - name: Run performance benchmarks
        run: |
          julia --project=. benchmark/bench_regression.jl \
            --baseline benchmark/baseline_main.txt \
            --update benchmark/baseline_current.txt

      - name: Compare with baseline
        id: compare
        run: |
          julia --project=. benchmark/bench_regression.jl \
            --baseline benchmark/baseline_main.txt \
            --threshold 1.3
        continue-on-error: true

      - name: Upload current benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.version }}
          path: |
            benchmark/baseline_current.txt
            benchmark/baseline.txt
          retention-days: 30

      - name: Create performance comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = require('fs').readFileSync('benchmark/baseline_current.txt', 'utf8');
            const baseline = require('fs').readFileSync('benchmark/baseline_main.txt', 'utf8');

            let comment = '## Performance Regression Results\n\n';
            comment += '| Benchmark | Current (ms) | Baseline (ms) | Change |\n';
            comment += '|-----------|---------------|----------------|--------|\n';

            const resultLines = results.split('\n');
            const baselineLines = baseline.split('\n');

            for (let i = 0; i < resultLines.length; i++) {
              const resultParts = resultLines[i].split(',');
              if (resultParts.length >= 5) {
                const name = resultParts[0];
                const current = parseFloat(resultParts[4]);
                comment += `| ${name} | ${current.toFixed(2)} | N/A | N/A |\n`;
              }
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          github-token: ${{ secrets.GITHUB_TOKEN }}
